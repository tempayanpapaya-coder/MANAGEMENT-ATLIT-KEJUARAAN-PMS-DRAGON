<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PMS DRAGON SURAKARTA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --red:#C8102E;--red-dark:#8B0A1E;--red-glow:rgba(200,16,46,0.3);
  --gold:#D4A017;--gold-lt:#F0C040;--gold-glow:rgba(212,160,23,0.2);
  --black:#0A0A0A;--surface:#141414;--card:#1C1C1C;--card2:#222;
  --border:#2C2C2C;--border2:#383838;
  --text:#F0F0F0;--muted:#777;--muted2:#555;
  --blue:#1565C0;--blue-lt:#5B9BD5;--blue-bg:rgba(21,101,192,0.15);
  --red-bg:rgba(200,16,46,0.12);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
  --purple:#7B2FBE;
  --radius:10px;--radius-sm:6px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{background:var(--black);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overscroll-behavior:none;}

/* ═══ SYNC INDICATOR ════════════════════════════════════ */
#sync-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:.5px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .4s;pointer-events:none;
}
#sync-bar.hidden{transform:translateY(-100%);opacity:0;}
#sync-bar.saving{background:#1a3a1a;color:var(--green);border-bottom:1px solid var(--green);}
#sync-bar.error{background:#2a0a0a;color:var(--red);border-bottom:1px solid var(--red);}
#sync-bar.offline{background:#2a2000;color:var(--gold);border-bottom:1px solid var(--gold);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ═══ CONN STATUS ══════════════════════════════════════ */
#conn-status{
  display:flex;align-items:center;gap:6px;padding:4px 10px;
  border-radius:20px;border:1px solid var(--border);background:var(--surface);
  font-size:11px;font-weight:600;cursor:default;
}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted2);}
.conn-dot.online{background:var(--green);box-shadow:0 0 6px var(--green);}
.conn-dot.offline{background:var(--red);}
.conn-dot.sync{background:var(--gold);animation:pulse 1s infinite;}

/* ═══ HEADER ════════════════════════════════════════════ */
header{background:linear-gradient(160deg,#0A0A0A 0%,#1a0408 60%,#0A0A0A 100%);border-bottom:2px solid var(--red);position:sticky;top:0;z-index:50;}
.header-inner{max-width:1100px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;gap:12px;}
.logo-img{height:48px;width:auto;flex-shrink:0;}
.header-text h1{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;color:var(--gold-lt);line-height:1.1;}
.header-text .sub{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.header-stats{display:flex;gap:8px;}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;text-align:center;}
.stat-pill .num{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--gold);display:block;line-height:1;}
.stat-pill .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
@media(max-width:540px){.header-stats{display:none;}.header-text h1{font-size:16px;}.logo-img{height:40px;}}

/* ═══ TABS ══════════════════════════════════════════════ */
.tabs-wrap{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:72px;z-index:40;}
.tabs-bar{max-width:1100px;margin:0 auto;padding:0 16px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;}
.tabs-bar::-webkit-scrollbar{display:none;}
.tab-btn{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:10px 20px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red);}
@media(max-width:480px){.tabs-wrap{top:64px;}}

/* ═══ MAIN ══════════════════════════════════════════════ */
main{max-width:1100px;margin:0 auto;padding:16px 16px calc(80px + var(--safe-bottom));}
.day-panel{display:none;animation:fadeIn .2s ease;}
.day-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ═══ TOOLBAR ═══════════════════════════════════════════ */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;gap:10px;flex-wrap:wrap;}
.toolbar-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.day-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;letter-spacing:2px;color:var(--gold-lt);}
.day-date-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--muted);font-size:12px;padding:6px 10px;width:140px;}
.toolbar-right{display:flex;gap:6px;flex-wrap:wrap;}
.btn-tool{background:transparent;border:1px solid var(--border2);color:var(--muted);border-radius:var(--radius-sm);padding:7px 14px;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-tool:hover{border-color:var(--gold);color:var(--gold);}
.btn-tool.red{border-color:var(--red);color:var(--red);}
.btn-tool.red:hover{background:var(--red);color:#fff;}

/* ═══ CLASS SECTIONS ════════════════════════════════════ */
.class-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;}
.class-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;gap:10px;}
.class-header:hover{background:rgba(255,255,255,.02);}
.class-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.class-badge{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1.5px;padding:3px 8px;border-radius:4px;text-transform:uppercase;}
.badge-prestasi{background:var(--gold);color:#000;}
.badge-semi{background:var(--purple);color:#fff;}
.badge-pemula{background:#0D7840;color:#fff;}
.class-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;}
.class-count{font-size:11px;color:var(--muted);}
.toggle-icon{font-size:14px;color:var(--muted);transition:transform .3s;flex-shrink:0;}
.class-section.collapsed .toggle-icon{transform:rotate(-90deg);}
.class-section.collapsed .class-body{display:none;}

/* ═══ ADD FORM ══════════════════════════════════════════ */
.add-form{padding:14px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);}
.add-form-title{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.form-grid{display:grid;grid-template-columns:80px 1fr 75px;gap:8px;margin-bottom:8px;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
input,select{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border .2s;width:100%;-webkit-appearance:none;}
input:focus,select:focus{border-color:var(--red);}
select option{background:var(--card);}
.hugo-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.hugo-btn{padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;background:var(--card);color:var(--muted);text-align:center;}
.hugo-btn.active-red{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.hugo-btn.active-blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-lt);}
.btn-add-main{width:100%;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;transition:all .2s;margin-top:4px;}
.btn-add-main:hover{background:var(--red-dark);}
.btn-add-main:disabled{background:var(--muted2);cursor:not-allowed;}
@media(max-width:560px){.form-grid{grid-template-columns:70px 1fr 65px;gap:6px;}}

/* ═══ ATHLETE CARDS ═════════════════════════════════════ */
.athletes-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.athlete-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .3s;}
.athlete-card.gugur{opacity:.55;}
.athlete-card.juara{border-color:var(--gold);}
/* Flash animation for real-time update */
@keyframes flashUpdate{0%{background:rgba(200,16,46,0.15);}100%{background:transparent;}}
.athlete-card.updated{animation:flashUpdate .8s ease;}
.card-header{display:flex;align-items:center;padding:10px 14px;gap:10px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);}
.card-num{font-family:'Oswald',sans-serif;font-size:11px;color:var(--muted);width:20px;flex-shrink:0;}
.card-under{font-family:'Oswald',sans-serif;font-size:16px;color:var(--gold);font-weight:700;flex-shrink:0;min-width:44px;}
.card-name{font-weight:600;font-size:14px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-medal-badge{font-size:18px;flex-shrink:0;}
.card-actions{display:flex;gap:6px;margin-left:auto;flex-shrink:0;}
.btn-card{background:transparent;border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:13px;padding:5px 9px;transition:all .2s;color:var(--muted);}
.btn-card:hover{border-color:var(--gold);color:var(--gold);}
.btn-card.del:hover{border-color:var(--red);color:var(--red);}

/* ═══ MATCH ROUNDS ══════════════════════════════════════ */
.card-rounds{padding:10px 14px 12px;display:flex;flex-direction:column;gap:8px;}
.rounds-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;}
.rounds-track{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.round-pill{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 6px;font-size:12px;cursor:pointer;transition:all .2s;user-select:none;flex-shrink:0;}
.round-pill:hover{border-color:var(--border2);}
.round-dot{width:10px;height:10px;border-radius:50%;background:var(--muted2);flex-shrink:0;}
.round-pill[data-result="menang"] .round-dot{background:var(--green);}
.round-pill[data-result="kalah"] .round-dot{background:var(--red);}
.round-pill[data-result="bye"] .round-dot{background:var(--gold);}
.round-pill .round-lbl{color:var(--muted);font-size:11px;font-weight:500;}
.round-pill[data-result="menang"] .round-lbl{color:var(--green);}
.round-pill[data-result="kalah"] .round-lbl{color:var(--red);}
.round-pill[data-result="bye"] .round-lbl{color:var(--gold);}
.round-pill .round-partai{font-weight:700;color:var(--text);font-size:12px;}
.btn-add-round{background:transparent;border:1px dashed var(--border2);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--muted2);cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-add-round:hover{border-color:var(--red);color:var(--red);}

/* ═══ CARD FOOTER ═══════════════════════════════════════ */
.card-footer{display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.5px;}
.status-badge.menunggu{background:rgba(119,119,119,.15);color:var(--muted);}
.status-badge.lanjut{background:var(--green-bg);color:var(--green);}
.status-badge.gugur-badge{background:var(--red-bg);color:var(--red);}
.status-badge.juara-badge{background:var(--gold-glow);color:var(--gold-lt);border:1px solid var(--gold);}
.card-hugo-display{margin-left:auto;font-size:11px;font-weight:700;}
.hugo-merah{color:var(--red);}
.hugo-biru{color:var(--blue-lt);}
.athlete-card.pemula .card-rounds{display:none;}

/* ═══ EMPTY STATE ════════════════════════════════════════ */
.empty-state{padding:32px;text-align:center;color:var(--muted);}
.empty-state .empty-icon{font-size:36px;margin-bottom:8px;opacity:.4;}
.empty-state p{font-size:13px;}

/* ═══ LOADING STATE ══════════════════════════════════════ */
.loading-state{padding:40px;text-align:center;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══ MODALS ═════════════════════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;place-items:start center;padding:20px;overflow-y:auto;}
.modal-overlay.open{display:grid;}
.modal{background:var(--card);border:1px solid var(--red);border-radius:14px;padding:24px;width:min(460px,100%);margin:auto;box-shadow:0 0 60px var(--red-glow);}
.modal h2{font-family:'Oswald',sans-serif;font-size:18px;color:var(--gold-lt);margin-bottom:18px;letter-spacing:1px;}
.modal-form{display:flex;flex-direction:column;gap:14px;}
.modal-form label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-modal-save{flex:1;background:var(--red);color:#fff;border:none;border-radius:8px;padding:12px;font-family:'Oswald',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;}
.btn-modal-save:disabled{background:var(--muted2);cursor:not-allowed;}
.btn-modal-cancel{flex:1;background:var(--surface);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:'Oswald',sans-serif;font-size:14px;cursor:pointer;}
.hugo-modal-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.hugo-modal-btn{padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;text-align:center;transition:all .2s;}
.hugo-modal-btn.sel-red{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.hugo-modal-btn.sel-blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-lt);}

/* Round Modal */
.round-modal-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px;}
.result-opt{padding:14px 8px;border-radius:8px;border:2px solid var(--border);background:var(--card2);cursor:pointer;text-align:center;font-size:12px;font-weight:700;transition:all .2s;}
.result-opt.menang{border-color:var(--green);color:var(--green);background:var(--green-bg);}
.result-opt.kalah{border-color:var(--red);color:var(--red);background:var(--red-bg);}
.result-opt.bye{border-color:var(--gold);color:var(--gold);background:var(--gold-glow);}
.result-opt.selected{outline:3px solid white;}

/* ═══ REKAP ══════════════════════════════════════════════ */
.rekap-panel{background:var(--surface);border:1px solid var(--gold);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.rekap-title{font-family:'Oswald',sans-serif;font-size:16px;color:var(--gold-lt);letter-spacing:1px;margin-bottom:12px;}
.rekap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.rekap-col{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.rekap-col ul{list-style:none;display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.rekap-col li{font-size:11px;color:var(--muted);padding:4px 8px;background:rgba(255,255,255,.02);border-radius:4px;}
@media(max-width:480px){.rekap-grid{grid-template-columns:1fr;}}

/* ═══ FAB ════════════════════════════════════════════════ */
.fab-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px calc(10px + var(--safe-bottom));background:linear-gradient(to top,var(--black) 60%,transparent);display:flex;gap:8px;z-index:30;}
.btn-fab{flex:1;padding:14px;background:var(--red);color:#fff;border:none;border-radius:var(--radius);font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.btn-fab.outline{background:transparent;border:1px solid var(--border2);color:var(--muted);}
@media(min-width:768px){.fab-bar{display:none;}}

/* ═══ PRINT ══════════════════════════════════════════════ */
@media print{
  #sync-bar,header,.tabs-wrap,.toolbar,.add-form,.card-actions,.fab-bar,.btn-add-round{display:none!important;}
  body{background:#fff;color:#000;}
  .class-section{border:1px solid #ccc;page-break-inside:avoid;margin-bottom:10px;}
  .day-panel{display:block!important;}
  .class-section.collapsed .class-body{display:block!important;}
  .athlete-card{border:1px solid #ccc;margin-bottom:6px;break-inside:avoid;}
}
</style>
</head>
<body>

<!-- SYNC BAR -->
<div id="sync-bar" class="hidden">
  <span class="sync-dot"></span>
  <span id="sync-msg">Menyimpan...</span>
</div>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <img src="https://raw.githubusercontent.com/tempayanpapaya-coder/Sekak/refs/heads/main/dragon.png" alt="Logo" class="logo-img">
    <div class="header-text">
      <h1>PMS DRAGON</h1>
      <div class="sub">Manajemen Pertandingan · Real-Time</div>
    </div>
    <div class="header-right">
      <div id="conn-status"><span class="conn-dot" id="conn-dot"></span><span id="conn-lbl">Menghubungkan...</span></div>
      <div class="header-stats">
        <div class="stat-pill"><span class="num" id="total-atlit">0</span><span class="lbl">Atlit</span></div>
        <div class="stat-pill"><span class="num" id="total-merah">0</span><span class="lbl">🔴</span></div>
        <div class="stat-pill"><span class="num" id="total-biru">0</span><span class="lbl">🔵</span></div>
      </div>
    </div>
  </div>
</header>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchDay(0)">📅 Hari 1</button>
    <button class="tab-btn" onclick="switchDay(1)">📅 Hari 2</button>
    <button class="tab-btn" onclick="switchDay(2)">📅 Hari 3</button>
    <button class="tab-btn" onclick="switchDay(3)">🏆 Rekap</button>
  </div>
</div>

<!-- MAIN -->
<main>
  <div id="day-0" class="day-panel active"><div class="loading-state"><div class="spinner"></div><p>Memuat data dari server...</p></div></div>
  <div id="day-1" class="day-panel"><div class="loading-state"><div class="spinner"></div><p>Memuat data dari server...</p></div></div>
  <div id="day-2" class="day-panel"><div class="loading-state"><div class="spinner"></div><p>Memuat data dari server...</p></div></div>
  <div id="day-3" class="day-panel">
    <div style="padding:12px 0 16px;"><div style="font-family:'Oswald',sans-serif;font-size:20px;color:var(--gold-lt);letter-spacing:2px;">🏆 REKAP MEDALI</div></div>
    <div id="papan-medali"><div class="loading-state"><div class="spinner"></div><p>Memuat rekap...</p></div></div>
  </div>
</main>

<!-- FAB -->
<div class="fab-bar">
  <button class="btn-fab outline" onclick="window.print()">🖨️</button>
  <button class="btn-fab outline" onclick="exportCSV(activeDay)">📥 CSV</button>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ Edit Atlit</h2>
    <div class="modal-form">
      <div><label>Under (kg)</label><input type="text" id="m-under" placeholder="-45, +87"/></div>
      <div><label>Nama Atlit</label><input type="text" id="m-name" placeholder="Nama lengkap"/></div>
      <div><label>Warna Hugo</label>
        <div class="hugo-modal-row">
          <div class="hugo-modal-btn" id="m-btn-merah" onclick="selectModalHugo('merah')">🔴 MERAH</div>
          <div class="hugo-modal-btn" id="m-btn-biru" onclick="selectModalHugo('biru')">🔵 BIRU</div>
        </div>
      </div>
      <div><label>Lapangan</label>
        <select id="m-lapangan">

<script>
// ════════════════════════════════════════════════════════
//  FIREBASE INIT
// ════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyATIQKEoacfqd_P5mBn915gzwbsLQE-va8",
  authDomain: "spp-unisri-taekwondo.firebaseapp.com",
  projectId: "spp-unisri-taekwondo",
  storageBucket: "spp-unisri-taekwondo.firebasestorage.app",
  messagingSenderId: "888126318699",
  appId: "1:888126318699:web:6e1ef3d5a49908c2b5692e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
// Enable offline persistence (data tetap tersedia saat offline)
db.enablePersistence().catch(()=>{});

// ════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════
const DAYS       = ['Hari Pertama','Hari Kedua','Hari Ketiga'];
const CLASSES    = [
  {id:'prestasi', label:'Prestasi',      badge:'badge-prestasi', multiRound:true},
  {id:'semi',     label:'Semi Prestasi', badge:'badge-semi',     multiRound:true},
  {id:'pemula',   label:'Pemula',        badge:'badge-pemula',   multiRound:false},
];
const LAPANGAN   = ['A','B','C','D','E','F'];
const BABAK_NAMES= ['Babak 1','Babak 2','Babak 3','Babak 4','Babak 5','Babak 6'];
const MEDAL_ICONS= {Emas:'🥇',Perak:'🥈',Perunggu:'🥉'};

// ════════════════════════════════════════════════════════
//  STATE (in-memory cache, synced from Firestore)
// ════════════════════════════════════════════════════════
// data[day][classId] = array of athlete objects
// Firestore structure:
//   collection: "pms_days"
//   document:   "day_0", "day_1", "day_2"
//   field:      prestasi: [...], semi: [...], pemula: [...]
//   document:   "meta"  → dates: {0:'', 1:'', 2:''}
let data       = {0:{prestasi:[],semi:[],pemula:[]},1:{prestasi:[],semi:[],pemula:[]},2:{prestasi:[],semi:[],pemula:[]}};
let activeDay  = 0;
let editTarget = null, roundTarget = null;
let modalHugo  = 'merah', roundResult = null;
let idCounter  = Date.now(); // use timestamp-based IDs for multi-user safety
let unsubscribers = []; // Firestore listeners to detach on cleanup
const hugoState = {};
let isSaving = false;

// ════════════════════════════════════════════════════════
//  CONNECTION STATUS
// ════════════════════════════════════════════════════════
function setConnStatus(state, label) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-lbl');
  dot.className = 'conn-dot ' + state;
  lbl.textContent = label;
}

// Monitor online/offline
window.addEventListener('online',  () => setConnStatus('online',  '🟢 Online'));
window.addEventListener('offline', () => setConnStatus('offline', '🔴 Offline'));

// ════════════════════════════════════════════════════════
//  SYNC BAR
// ════════════════════════════════════════════════════════
let syncTimer = null;
function showSync(type, msg) {
  const bar = document.getElementById('sync-bar');
  document.getElementById('sync-msg').textContent = msg;
  bar.className = type;
  clearTimeout(syncTimer);
  if(type !== 'saving') syncTimer = setTimeout(() => bar.classList.add('hidden'), 2500);
}
function hideSync() {
  clearTimeout(syncTimer);
  document.getElementById('sync-bar').classList.add('hidden');
}

// ════════════════════════════════════════════════════════
//  FIRESTORE — WRITE (debounced per day)
// ════════════════════════════════════════════════════════
const saveTimers = {};
function saveDay(d) {
  clearTimeout(saveTimers[d]);
  saveTimers[d] = setTimeout(async () => {
    showSync('saving', '☁️ Menyimpan ke server...');
    setConnStatus('sync', '⟳ Menyimpan');
    try {
      await db.collection('pms_days').doc('day_' + d).set({
        prestasi: data[d].prestasi || [],
        semi:     data[d].semi     || [],
        pemula:   data[d].pemula   || [],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      showSync('saving', '✅ Tersimpan!');
      setTimeout(() => hideSync(), 1200);
      setConnStatus('online', '🟢 Online');
    } catch(err) {
      showSync('error', '❌ Gagal menyimpan: ' + err.message);
      setConnStatus('offline', '🔴 Error');
      console.error('Firestore write error:', err);
    }
  }, 600); // debounce 600ms
}

function saveMeta() {
  const dates = JSON.parse(localStorage.getItem('pms_dates') || '{}');
  db.collection('pms_days').doc('meta').set({ dates }, { merge: true }).catch(console.error);
}

// ════════════════════════════════════════════════════════
//  FIRESTORE — REAL-TIME LISTENERS (onSnapshot)
// ════════════════════════════════════════════════════════
let listenersStarted = false;
function startListeners() {
  if(listenersStarted) return;
  listenersStarted = true;
  setConnStatus('sync', '⟳ Menghubungkan');

  // Listen all 3 days
  for(let d = 0; d < 3; d++) {
    const unsub = db.collection('pms_days').doc('day_' + d)
      .onSnapshot({ includeMetadataChanges: true }, snap => {
        if(snap.exists) {
          const docData = snap.data();
          const prev = JSON.stringify(data[d]);
          data[d] = {
            prestasi: docData.prestasi || [],
            semi:     docData.semi     || [],
            pemula:   docData.pemula   || [],
          };
          const curr = JSON.stringify(data[d]);
          // Only re-render if data actually changed
          if(prev !== curr) {
            buildPanel(d);
            renderMedalRekap();
            updateStats();
            // Flash indicator if change came from another device
            if(!snap.metadata.hasPendingWrites && !snap.metadata.fromCache) {
              showSync('saving', '🔄 Data diperbarui oleh official lain');
              setTimeout(hideSync, 2000);
            }
          }
        } else {
          // Document doesn't exist yet, render empty
          buildPanel(d);
        }
        if(!snap.metadata.fromCache) {
          setConnStatus('online', '🟢 Online · Sinkron');
        }
      }, err => {
        console.error('Snapshot error day ' + d, err);
        setConnStatus('offline', '🔴 Koneksi bermasalah');
        showSync('error', '❌ Koneksi terputus, coba reload');
      });
    unsubscribers.push(unsub);
  }

  // Listen meta (dates)
  const unsubMeta = db.collection('pms_days').doc('meta')
    .onSnapshot(snap => {
      if(snap.exists) {
        const d = snap.data();
        if(d.dates) localStorage.setItem('pms_dates', JSON.stringify(d.dates));
        // Refresh date inputs
        const dates = d.dates || {};
        for(let i=0;i<3;i++){
          const inp = document.getElementById('date-inp-' + i);
          if(inp && dates[i]) inp.value = dates[i];
        }
      }
    }, ()=>{});
  unsubscribers.push(unsubMeta);
}

// ════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════
function esc(s=''){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getAthleteStatus(a, cls) {
  const c = CLASSES.find(x => x.id === cls);
  if(!c.multiRound) return (a.rounds && a.rounds.length) ? 'lanjut' : 'menunggu';
  if(!a.rounds || !a.rounds.length) return 'menunggu';
  const last = a.rounds[a.rounds.length - 1];
  if(last.result === 'kalah') return 'gugur';
  if(a.medali && a.medali !== 'Tanpa Medali') return 'juara';
  return 'lanjut';
}

function statusLabel(st) {
  const map = {
    menunggu: '<span class="status-badge menunggu">⏳ Menunggu</span>',
    lanjut:   '<span class="status-badge lanjut">🟢 Lanjut</span>',
    gugur:    '<span class="status-badge gugur-badge">❌ Gugur</span>',
    juara:    '<span class="status-badge juara-badge">🏆 Juara</span>',
  };
  return map[st] || map.menunggu;
}

// ════════════════════════════════════════════════════════
//  ACTIONS (write to local cache → Firestore)
// ════════════════════════════════════════════════════════
function setHugo(d, cls, color) {
  hugoState[`${d}-${cls}`] = color;
  ['merah','biru'].forEach(c => {
    const btn = document.getElementById(`hbtn-${d}-${cls}-${c}`);
    if(btn) btn.className = 'hugo-btn' + (c===color ? (c==='merah'?' active-red':' active-blue') : '');
  });
}
function getHugo(d, cls) { return hugoState[`${d}-${cls}`] || 'merah'; }

function addAthlete(d, cls) {
  const under   = document.getElementById(`f-under-${d}-${cls}`)?.value.trim();
  const name    = document.getElementById(`f-name-${d}-${cls}`)?.value.trim();
  const partai  = document.getElementById(`f-partai-${d}-${cls}`)?.value.trim();
  const lapangan= document.getElementById(`f-lap-${d}-${cls}`)?.value || 'A';
  if(!name){ alert('Nama atlit wajib diisi!'); return; }
  const c = CLASSES.find(x => x.id === cls);
  const athlete = {
    id:       Date.now() + Math.floor(Math.random()*1000), // unique across devices
    under:    under || '-',
    name, lapangan,
    hugo:     getHugo(d, cls),
    medali:   'Tanpa Medali',
    rounds:   c.multiRound ? [] : null,
    partai:   c.multiRound ? '' : (partai || ''),
    createdAt: Date.now(),
  };
  if(c.multiRound && partai) {
    athlete.rounds.push({partai, result:'pending'});
  }
  if(!data[d][cls]) data[d][cls] = [];
  data[d][cls].push(athlete);
  saveDay(d);
  buildPanel(d);
  renderMedalRekap();
  updateStats();
  ['under','name','partai'].forEach(f => { const el = document.getElementById(`f-${f}-${d}-${cls}`); if(el) el.value = ''; });
  document.getElementById(`f-name-${d}-${cls}`)?.focus();
}

function deleteAthlete(d, cls, id) {
  if(!confirm('Hapus atlit ini?')) return;
  data[d][cls] = (data[d][cls] || []).filter(a => a.id !== id);
  saveDay(d);
  buildPanel(d);
  renderMedalRekap();
  updateStats();
}

function updateField(d, cls, id, field, value) {
  const a = (data[d][cls] || []).find(x => x.id === id);
  if(!a) return;
  a[field] = value;
  saveDay(d);
  if(field === 'medali') { buildPanel(d); renderMedalRekap(); updateStats(); }
}

function resetDay(d) {
  CLASSES.forEach(c => { data[d][c.id] = []; });
  saveDay(d);
  buildPanel(d);
  renderMedalRekap();
  updateStats();
}

// ════════════════════════════════════════════════════════
//  ROUND MODAL
// ════════════════════════════════════════════════════════
function openRoundModal(d, cls, id, roundIdx) {
  const a = (data[d][cls] || []).find(x => x.id === id);
  if(!a) return;
  roundTarget = {d, cls, id, roundIdx};
  roundResult = null;
  const babakName = BABAK_NAMES[roundIdx] || `Babak ${roundIdx+1}`;
  document.getElementById('round-modal-title').textContent = `⚔️ ${a.name} — ${babakName}`;
  const existing = a.rounds && a.rounds[roundIdx];
  document.getElementById('r-partai').value = existing?.partai || '';
  document.querySelectorAll('.result-opt').forEach(el => el.classList.remove('selected'));
  document.getElementById('r-selected').textContent = '';
  if(existing?.result && existing.result !== 'pending') selectResult(existing.result);
  document.getElementById('roundModal').classList.add('open');
}

function closeRoundModal() {
  document.getElementById('roundModal').classList.remove('open');
  roundTarget = null; roundResult = null;
}

function selectResult(r) {
  roundResult = r;
  document.querySelectorAll('.result-opt').forEach(el => el.classList.toggle('selected', el.classList.contains(r)));
  const labels = {menang:'✅ MENANG',kalah:'❌ KALAH',bye:'⏭️ BYE'};
  document.getElementById('r-selected').textContent = 'Dipilih: ' + labels[r];
}

function saveRound() {
  if(!roundTarget){ return; }
  if(!roundResult){ alert('Pilih hasil tanding terlebih dahulu!'); return; }
  const {d, cls, id, roundIdx} = roundTarget;
  const a = (data[d][cls] || []).find(x => x.id === id);
  if(!a) return;
  const partai = document.getElementById('r-partai').value.trim();
  if(!a.rounds) a.rounds = [];
  const roundData = {partai, result: roundResult};
  if(roundIdx < a.rounds.length) a.rounds[roundIdx] = roundData;
  else a.rounds.push(roundData);
  saveDay(d);
  buildPanel(d);
  renderMedalRekap();
  closeRoundModal();
}

// ════════════════════════════════════════════════════════
//  EDIT MODAL
// ════════════════════════════════════════════════════════
let editTarget2 = null, modalHugo2 = 'merah';
function openModal(d, cls, id) {
  const a = (data[d][cls] || []).find(x => x.id === id);
  if(!a) return;
  editTarget2 = {d, cls, id};
  document.getElementById('m-under').value    = a.under    || '';
  document.getElementById('m-name').value     = a.name     || '';
  document.getElementById('m-lapangan').value = a.lapangan || 'A';
  selectModalHugo(a.hugo || 'merah');
  document.getElementById('editModal').classList.add('open');
}
function closeModal() { document.getElementById('editModal').classList.remove('open'); editTarget2 = null; }
function selectModalHugo(color) {
  modalHugo2 = color;
  document.getElementById('m-btn-merah').className = 'hugo-modal-btn' + (color==='merah'?' sel-red':'');
  document.getElementById('m-btn-biru').className  = 'hugo-modal-btn' + (color==='biru'?' sel-blue':'');
}
function saveModal() {
  if(!editTarget2) return;
  const {d, cls, id} = editTarget2;
  const a = (data[d][cls] || []).find(x => x.id === id);
  if(!a) return;
  a.under    = document.getElementById('m-under').value.trim();
  a.name     = document.getElementById('m-name').value.trim();
  a.lapangan = document.getElementById('m-lapangan').value;
  a.hugo     = modalHugo2;
  saveDay(d);
  buildPanel(d);
  closeModal();
}

// ════════════════════════════════════════════════════════
//  REKAP
// ════════════════════════════════════════════════════════
function renderMedalRekap() {
  let emas = [], perak = [], perunggu = [];
  for(let d=0; d<3; d++) {
    CLASSES.forEach(c => {
      (data[d][c.id] || []).forEach(a => {
        const entry = `${esc(a.name)} <small style="color:var(--muted)">(${c.label} U${esc(a.under)}, ${DAYS[d]})</small>`;
        if(a.medali==='Emas')     emas.push(entry);
        else if(a.medali==='Perak')    perak.push(entry);
        else if(a.medali==='Perunggu') perunggu.push(entry);
      });
    });
  }
  const container = document.getElementById('papan-medali');
  if(!container) return;
  container.innerHTML = `
    <div class="rekap-panel">
      <div class="rekap-title">🏆 Perolehan Medali — PMS Dragon Surakarta</div>
      <div class="rekap-grid">
        <div class="rekap-col">
          <div style="font-size:13px;font-weight:700;color:var(--gold-lt)">🥇 EMAS (${emas.length})</div>
          <ul>${emas.map(x=>`<li>${x}</li>`).join('') || '<li style="font-style:italic">Belum ada</li>'}</ul>
        </div>
        <div class="rekap-col">
          <div style="font-size:13px;font-weight:700;color:#C0C0C0">🥈 PERAK (${perak.length})</div>
          <ul>${perak.map(x=>`<li>${x}</li>`).join('') || '<li style="font-style:italic">Belum ada</li>'}</ul>
        </div>
        <div class="rekap-col">
          <div style="font-size:13px;font-weight:700;color:#CD7F32">🥉 PERUNGGU (${perunggu.length})</div>
          <ul>${perunggu.map(x=>`<li>${x}</li>`).join('') || '<li style="font-style:italic">Belum ada</li>'}</ul>
        </div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════
//  MISC
// ════════════════════════════════════════════════════════
function switchDay(d) {
  activeDay = d;
  document.querySelectorAll('.day-panel').forEach((p,i) => p.classList.toggle('active', i===d));
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===d));
}
function toggleSection(id) { document.getElementById(id).classList.toggle('collapsed'); }
function updateStats() {
  let total=0, red=0, blue=0;
  for(let d=0; d<3; d++) CLASSES.forEach(c => {
    (data[d][c.id]||[]).forEach(a => { total++; if(a.hugo==='merah') red++; else blue++; });
  });
  document.getElementById('total-atlit').textContent = total;
  document.getElementById('total-merah').textContent = red;
  document.getElementById('total-biru').textContent  = blue;
}
function saveDate(d, val) {
  const dates = JSON.parse(localStorage.getItem('pms_dates') || '{}');
  dates[d] = val;
  localStorage.setItem('pms_dates', JSON.stringify(dates));
  saveMeta();
}
function printDay(d) { switchDay(d); setTimeout(() => window.print(), 200); }
function exportCSV(d) {
  if(d >= 3){ alert('Pilih Hari 1-3 untuk export CSV.'); return; }
  let rows = ['Kelas,Under,Nama,Lapangan,Hugo,Babak,Partai,Hasil,Medali'];
  CLASSES.forEach(c => {
    (data[d][c.id]||[]).forEach(a => {
      const rounds = (a.rounds && a.rounds.length) ? a.rounds : [{partai:a.partai||'',result:''}];
      rounds.forEach((r,ri) => {
        rows.push(`"${c.label}","${a.under}","${a.name}","${a.lapangan||'A'}","${a.hugo}","Babak ${ri+1}","${r.partai||''}","${r.result||''}","${a.medali||''}"`);
      });
    });
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url; link.download = `pms_dragon_hari${d+1}.csv`; link.click();
  URL.revokeObjectURL(url);
}

// Close modals
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeRoundModal(); }});
document.getElementById('editModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('roundModal').addEventListener('click', function(e){ if(e.target===this) closeRoundModal(); });

// ════════════════════════════════════════════════════════
//  INIT — start listeners immediately
// ════════════════════════════════════════════════════════
startListeners();
updateStats();
</script>
