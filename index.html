<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMS DRAGON SURAKARTA — Manajemen Pertandingan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --red:       #C8102E;
    --red-dark:  #8B0A1E;
    --red-glow:  rgba(200,16,46,0.25);
    --gold:      #D4A017;
    --gold-lt:   #F0C040;
    --black:     #0D0D0D;
    --surface:   #161616;
    --card:      #1E1E1E;
    --border:    #2A2A2A;
    --text:      #F0F0F0;
    --muted:     #888;
    --blue-hugo: #1565C0;
    --blue-bg:   rgba(21,101,192,0.15);
    --red-bg:    rgba(200,16,46,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, #0D0D0D 0%, #1a0005 50%, #0D0D0D 100%);
    border-bottom: 2px solid var(--red);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '🐉';
    position: absolute;
    font-size: 220px;
    opacity: 0.04;
    right: -20px;
    top: -30px;
    pointer-events: none;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 28px 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .logo-badge {
    width: 68px; height: 68px;
    background: radial-gradient(circle, var(--red) 0%, var(--red-dark) 100%);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 32px;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--red-glow);
  }
  .header-text h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-lt);
    line-height: 1;
  }
  .header-text .subtitle {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 24px;
    text-align: center;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
  }
  .stat-pill .num {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--gold);
    display: block;
  }
  .stat-pill .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── DAY TABS ────────────────────────────────────── */
  .tabs-bar {
    max-width: 1200px;
    margin: 24px auto 0;
    padding: 0 28px;
    display: flex;
    gap: 8px;
  }
  .tab-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 28px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--red); }
  .tab-btn.active {
    background: var(--red);
    color: #fff;
    border-color: var(--red);
    box-shadow: 0 -4px 16px var(--red-glow);
  }

  /* ── MAIN ────────────────────────────────────────── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 28px 60px;
  }
  .day-panel { display: none; }
  .day-panel.active { display: block; }

  /* ── CLASS SECTIONS ──────────────────────────────── */
  .class-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 0 12px 12px 12px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .class-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .class-header:hover { background: rgba(255,255,255,.03); }
  .class-title-row { display: flex; align-items: center; gap: 12px; }
  .class-badge {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .badge-prestasi   { background: var(--gold); color: #000; }
  .badge-semi       { background: #7B2FBE; color: #fff; }
  .badge-pemula     { background: #0D7840; color: #fff; }
  .class-name {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .class-count {
    font-size: 12px;
    color: var(--muted);
    margin-left: 8px;
  }
  .toggle-icon { font-size: 18px; transition: transform .3s; color: var(--muted); }
  .class-section.collapsed .toggle-icon { transform: rotate(-90deg); }
  .class-section.collapsed .class-body { display: none; }

  /* ── ADD FORM ────────────────────────────────────── */
  .add-form {
    padding: 16px 20px;
    background: rgba(255,255,255,.02);
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 90px 1fr 90px 1fr auto;
    gap: 8px;
    align-items: end;
  }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  input, select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border .2s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--red); }
  select option { background: var(--card); }

  .hugo-toggle { display: flex; gap: 6px; }
  .hugo-btn {
    flex: 1;
    padding: 8px 6px;
    border-radius: 6px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .5px;
    transition: all .2s;
    background: var(--card);
    color: var(--muted);
  }
  .hugo-btn.active-red  { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .hugo-btn.active-blue { background: var(--blue-bg); border-color: var(--blue-hugo); color: #5B9BD5; }

  .btn-add {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background .2s, box-shadow .2s;
    white-space: nowrap;
    align-self: end;
  }
  .btn-add:hover { background: var(--red-dark); box-shadow: 0 0 12px var(--red-glow); }

  /* ── ATHLETE TABLE ───────────────────────────────── */
  .athlete-table { width: 100%; border-collapse: collapse; }
  .athlete-table th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-align: left;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .athlete-table tr.athlete-row { transition: background .15s; }
  .athlete-table tr.athlete-row:hover { background: rgba(255,255,255,.03); }
  .athlete-table td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid #1e1e1e; vertical-align: middle; }
  .athlete-table tr:last-child td { border-bottom: none; }

  .td-num { color: var(--muted); font-size: 12px; width: 36px; }
  .td-under { font-family: 'Oswald', sans-serif; font-size: 15px; color: var(--gold); }
  .td-name { font-weight: 500; }
  .td-partai { color: var(--muted); }
  .hugo-chip {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .chip-merah { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }
  .chip-biru  { background: var(--blue-bg); color: #5B9BD5; border: 1px solid var(--blue-hugo); }

  .td-actions { display: flex; gap: 6px; justify-content: flex-end; }
  .btn-edit, .btn-del {
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    padding: 4px 10px;
    transition: all .2s;
  }
  .btn-edit { background: #2A2A2A; color: var(--text); }
  .btn-edit:hover { background: var(--gold); color: #000; }
  .btn-del { background: #2A2A2A; color: var(--muted); }
  .btn-del:hover { background: #4A1020; color: var(--red); }

  .empty-row td { text-align: center; color: var(--muted); font-size: 13px; padding: 24px; }
  .empty-row td span { opacity: .5; }

  /* ── INLINE EDIT ─────────────────────────────────── */
  .edit-row td { padding: 8px 10px; background: rgba(200,16,46,.05); }
  .edit-row input, .edit-row select {
    padding: 6px 8px;
    font-size: 12px;
  }
  .btn-save { background: var(--red); color: #fff; }
  .btn-save:hover { background: var(--red-dark); }
  .btn-cancel-edit { background: #2A2A2A; color: var(--muted); }

  /* ── TOOLBAR ─────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 8px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar-left { display: flex; gap: 8px; align-items: center; }
  .day-title {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-lt);
  }
  .day-date-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 5px 10px;
    width: 150px;
  }
  .toolbar-right { display: flex; gap: 8px; }
  .btn-export {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 6px;
    padding: 7px 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-export:hover { background: var(--gold); color: #000; }

  /* ── MODAL ───────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    place-items: center;
  }
  .modal-overlay.open { display: grid; }
  .modal {
    background: var(--card);
    border: 1px solid var(--red);
    border-radius: 14px;
    padding: 28px;
    width: min(480px, 90vw);
    box-shadow: 0 0 40px var(--red-glow);
  }
  .modal h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    color: var(--gold-lt);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .modal-form { display: flex; flex-direction: column; gap: 14px; }
  .modal-form label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 6px; }
  .btn-modal-save {
    flex: 1;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .btn-modal-save:hover { background: var(--red-dark); }
  .btn-modal-cancel {
    flex: 1;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }
  .hugo-modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .hugo-modal-btn {
    padding: 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .2s;
    text-align: center;
  }
  .hugo-modal-btn.sel-red  { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .hugo-modal-btn.sel-blue { background: var(--blue-bg); border-color: var(--blue-hugo); color: #5B9BD5; }

  /* ── PRINT / EXPORT ──────────────────────────────── */
  @media print {
    header, .tabs-bar, .toolbar, .add-form, .btn-edit, .btn-del, .td-actions,
    .btn-export, .toggle-icon { display: none !important; }
    body { background: #fff; color: #000; }
    .class-section { border: 1px solid #ccc; page-break-inside: avoid; }
    .athlete-table th, .athlete-table td { color: #000; border-color: #ccc; }
    .day-panel { display: block !important; }
    .class-section.collapsed .class-body { display: block !important; }
  }

  @media (max-width: 768px) {
    .header-stats { display: none; }
    .add-form { grid-template-columns: 1fr 1fr; }
    .add-form > *:last-child { grid-column: 1/-1; }
    .athlete-table .td-actions { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
 <img src="https://raw.githubusercontent.com/tempayanpapaya-coder/Sekak/refs/heads/main/dragon.png" alt="Logo Game Taekwondo" width="150">
    <div class="header-text">
      <h1>PMS DRAGON</h1>
      <div class="subtitle">JUARA JUARA JUARA</div>
    </div>
    <div class="header-stats">
      <div class="stat-pill">
        <span class="num" id="total-atlit">0</span>
        <span class="lbl">Total Atlit</span>
      </div>
      <div class="stat-pill">
        <span class="num" id="total-merah">0</span>
        <span class="lbl">Hugo Merah</span>
      </div>
      <div class="stat-pill">
        <span class="num" id="total-biru">0</span>
        <span class="lbl">Hugo Biru</span>
      </div>
    </div>
  </div>
</header>

<!-- DAY TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchDay(0)">Hari 1</button>
  <button class="tab-btn"       onclick="switchDay(1)">Hari 2</button>
  <button class="tab-btn"       onclick="switchDay(2)">Hari 3</button>
</div>

<!-- MAIN -->
<main>
  <!-- ───────────── DAY PANELS ───────────── -->
  <div id="day-0" class="day-panel active"></div>
  <div id="day-1" class="day-panel"></div>
  <div id="day-2" class="day-panel"></div>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>✏️ Edit Data Atlit</h2>
    <div class="modal-form">
      <div>
        <label>Under (kg)</label>
        <input type="text" id="m-under" placeholder="cth: -45, +87" />
      </div>
      <div>
        <label>Nama Atlit</label>
        <input type="text" id="m-name" placeholder="Nama lengkap" />
      </div>
      <div>
        <label>Nomor Partai</label>
        <input type="text" id="m-partai" placeholder="cth: 12" />
      </div>
      <div>
        <label>Warna Hugo</label>
        <div class="hugo-modal-row">
          <div class="hugo-modal-btn" id="m-btn-merah" onclick="selectModalHugo('merah')">🔴 MERAH</div>
          <div class="hugo-modal-btn" id="m-btn-biru"  onclick="selectModalHugo('biru')">🔵 BIRU</div>
        </div>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:20px">
      <button class="btn-modal-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-modal-save"   onclick="saveModal()">💾 Simpan</button>
    </div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────
const DAYS  = ['Hari Pertama', 'Hari Kedua', 'Hari Ketiga'];
const CLASSES = [
  { id:'prestasi', label:'Prestasi',     badge:'badge-prestasi' },
  { id:'semi',     label:'Semi Prestasi',badge:'badge-semi'     },
  { id:'pemula',   label:'Pemula',       badge:'badge-pemula'   },
];

// data[day][class] = [ {id, under, name, partai, hugo}, ... ]
let data = { 0:{}, 1:{}, 2:{} };
CLASSES.forEach(c => {
  for(let d=0;d<3;d++) data[d][c.id] = [];
});

let activeDay = 0;
let editTarget = null; // {day, cls, id}
let modalHugo  = 'merah';
let idCounter  = 1;

// ── LOAD / SAVE LOCALSTORAGE ───────────────────────────────────────
function save() {
  localStorage.setItem('pms_dragon', JSON.stringify({data, idCounter}));
  updateStats();
}
function load() {
  const raw = localStorage.getItem('pms_dragon');
  if(raw) {
    const p = JSON.parse(raw);
    data      = p.data;
    idCounter = p.idCounter || 1;
  }
}

// ── BUILD PANEL ────────────────────────────────────────────────────
function buildAllPanels() {
  for(let d=0;d<3;d++) buildPanel(d);
}

function buildPanel(d) {
  const el = document.getElementById('day-'+d);
  let dayDates = JSON.parse(localStorage.getItem('pms_dates')||'{}');
  const dateVal = dayDates[d] || '';
  el.innerHTML = `
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="day-title">${DAYS[d]}</span>
        <input class="day-date-input" type="date" value="${dateVal}"
               onchange="saveDate(${d},this.value)" title="Tanggal hari ke-${d+1}" />
      </div>
      <div class="toolbar-right">
        <button class="btn-export" onclick="printDay(${d})">🖨️ Cetak Hari Ini</button>
        <button class="btn-export" onclick="exportCSV(${d})">📥 Export CSV</button>
      </div>
    </div>
    ${CLASSES.map(c => buildClass(d,c)).join('')}
  `;
}

function buildClass(d, c) {
  const athletes = data[d][c.id] || [];
  const rows = athletes.length
    ? athletes.map((a,i) => `
      <tr class="athlete-row" id="row-${a.id}" style="${a.status==='Gugur'?'opacity:0.6; background:rgba(200,16,46,0.05);':''}">
        <td class="td-num">${i+1}</td>
        <td class="td-under">${escHtml(a.under)}</td>
        <td class="td-name">
          <span style="${a.status==='Gugur'?'text-decoration:line-through; color:var(--muted);':''}">${escHtml(a.name)}</span>
        </td>
        <td class="td-partai">Partai&nbsp;<strong>${escHtml(a.partai)}</strong></td>
        <td><span class="hugo-chip ${a.hugo==='merah'?'chip-merah':'chip-biru'}">
          ${a.hugo==='merah'?'🔴 Merah':'🔵 Biru'}</span></td>
        
        <td>
          <select onchange="updateMatchStatus(${d}, '${c.id}', ${a.id}, 'status', this.value)" 
                  style="padding:5px; font-size:11px; background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:4px;">
            <option value="Menunggu" ${a.status==='Menunggu'?'selected':''}>⏳ Tunggu</option>
            <option value="Lanjut Babak" ${a.status==='Lanjut Babak'?'selected':''}>🟢 Lanjut</option>
            <option value="Gugur" ${a.status==='Gugur'?'selected':''}>🔴 Gugur</option>
          </select>
        </td>
        <td>
          <select onchange="updateMatchStatus(${d}, '${c.id}', ${a.id}, 'medali', this.value)" 
                  style="padding:5px; font-size:11px; background:var(--card); color:var(--text); border:1px solid var(--border); border-radius:4px;">
            <option value="Tanpa Medali" ${a.medali==='Tanpa Medali' || !a.medali?'selected':''}>-</option>
            <option value="Emas" ${a.medali==='Emas'?'selected':''}>🥇 Emas</option>
            <option value="Perak" ${a.medali==='Perak'?'selected':''}>🥈 Perak</option>
            <option value="Perunggu" ${a.medali==='Perunggu'?'selected':''}>🥉 Perunggu</option>
          </select>
        </td>

        <td class="td-actions">
          <button class="btn-edit" onclick="openModal(${d},'${c.id}',${a.id})">✏️</button>
          <button class="btn-del"  onclick="deleteAthlete(${d},'${c.id}',${a.id})">🗑️</button>
        </td>
      </tr>`).join('')
    // Colspan diubah menjadi 8 agar sejajar mendatar
    : `<tr class="empty-row"><td colspan="8"><span>Belum ada atlit — tambahkan lewat form di atas ☝️</span></td></tr>`;

  return `
  <div class="class-section" id="sec-${d}-${c.id}">
    <div class="class-header" onclick="toggleSection('sec-${d}-${c.id}')">
      <div class="class-title-row">
        <span class="class-badge ${c.badge}">${c.label}</span>
        <span class="class-name">Kelas ${c.label}</span>
        <span class="class-count">(${athletes.length} atlit)</span>
      </div>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="class-body" style="overflow-x: auto;"> <form class="add-form" onsubmit="addAthlete(event,${d},'${c.id}')">
        <div class="form-group">
          <label>Under (kg)</label>
          <input name="under" type="text" placeholder="-45" required />
        </div>
        <div class="form-group">
          <label>Nama Atlit</label>
          <input name="name" type="text" placeholder="Nama lengkap" required />
        </div>
        <div class="form-group">
          <label>No. Partai</label>
          <input name="partai" type="text" placeholder="12" required />
        </div>
        <div class="form-group">
          <label>Warna Hugo</label>
          <div class="hugo-toggle">
            <button type="button" class="hugo-btn active-red"
                    id="hbtn-${d}-${c.id}-merah"
                    onclick="setHugo('${d}','${c.id}','merah')">🔴 Merah</button>
            <button type="button" class="hugo-btn"
                    id="hbtn-${d}-${c.id}-biru"
                    onclick="setHugo('${d}','${c.id}','biru')">🔵 Biru</button>
          </div>
        </div>
        <button type="submit" class="btn-add">+ Tambah</button>
      </form>
      <table class="athlete-table">
        <thead>
          <tr>
            <th>#</th><th>Under</th><th>Nama Atlit</th><th>Partai</th><th>Hugo</th>
            <th>Status</th><th>Medali</th><th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tbody-${d}-${c.id}">${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ── HUGO TOGGLE ─────────────────────────────────────────────────────
const hugoState = {};
function setHugo(d,cls,color) {
  hugoState[`${d}-${cls}`] = color;
  ['merah','biru'].forEach(c => {
    const btn = document.getElementById(`hbtn-${d}-${cls}-${c}`);
    if(btn) { btn.className = 'hugo-btn' + (c===color ? (c==='merah'?' active-red':' active-blue') : ''); }
  });
}
function getHugo(d,cls) { return hugoState[`${d}-${cls}`] || 'merah'; }

// ── ADD ─────────────────────────────────────────────────────────────
function addAthlete(e, d, cls) {
  e.preventDefault();
  const f = e.target;
  const athlete = {
    id:     idCounter++,
    under:  f.under.value.trim(),
    name:   f.name.value.trim(),
    partai: f.partai.value.trim(),
    hugo:   getHugo(d,cls),
      // Properti Tambahan Baru:
  status: 'Menunggu', // Pilihan: 'Menunggu', 'Lanjut Babak', 'Gugur'
  medali: 'Tanpa Medali', // Pilihan: 'Tanpa Medali', 'Emas', 'Perak', 'Perunggu'
  catatan: '' // Untuk coretan opsional (misal: "Semi Final", "Sakit")
  };
  data[d][cls].push(athlete);
  save();
  buildPanel(d);
  // re-focus form
  const newForm = document.querySelector(`#sec-${d}-${cls} input[name="name"]`);
  if(newForm) newForm.focus();
}

// ── DELETE ──────────────────────────────────────────────────────────
function deleteAthlete(d,cls,id) {
  if(!confirm('Hapus atlit ini?')) return;
  data[d][cls] = data[d][cls].filter(a=>a.id!==id);
  save();
  buildPanel(d);
}

// ── MODAL EDIT ──────────────────────────────────────────────────────
function openModal(d,cls,id) {
  const a = data[d][cls].find(x=>x.id===id);
  if(!a) return;
  editTarget = {d,cls,id};
  document.getElementById('m-under').value  = a.under;
  document.getElementById('m-name').value   = a.name;
  document.getElementById('m-partai').value = a.partai;
  selectModalHugo(a.hugo);
  document.getElementById('editModal').classList.add('open');
}
function closeModal() {
  document.getElementById('editModal').classList.remove('open');
  editTarget = null;
}
function selectModalHugo(color) {
  modalHugo = color;
  document.getElementById('m-btn-merah').className = 'hugo-modal-btn' + (color==='merah'?' sel-red':'');
  document.getElementById('m-btn-biru').className  = 'hugo-modal-btn' + (color==='biru'?' sel-blue':'');
}
function saveModal() {
  if(!editTarget) return;
  const {d,cls,id} = editTarget;
  const a = data[d][cls].find(x=>x.id===id);
  if(!a) return;
  a.under  = document.getElementById('m-under').value.trim();
  a.name   = document.getElementById('m-name').value.trim();
  a.partai = document.getElementById('m-partai').value.trim();
  a.hugo   = modalHugo;
  save();
  buildPanel(d);
  closeModal();
}

// ── TOGGLE COLLAPSE ─────────────────────────────────────────────────
function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ── DAY SWITCH ──────────────────────────────────────────────────────
function switchDay(d) {
  activeDay = d;
  document.querySelectorAll('.day-panel').forEach((p,i)=>p.classList.toggle('active',i===d));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===d));
}

// ── STATS ───────────────────────────────────────────────────────────
function updateStats() {
  let total=0, red=0, blue=0;
  for(let d=0;d<3;d++) CLASSES.forEach(c=>{
    (data[d][c.id]||[]).forEach(a=>{
      total++; if(a.hugo==='merah') red++; else blue++;
    });
  });
  document.getElementById('total-atlit').textContent = total;
  document.getElementById('total-merah').textContent = red;
  document.getElementById('total-biru').textContent  = blue;
}

// ── DATE SAVE ───────────────────────────────────────────────────────
function saveDate(d,val) {
  const dates = JSON.parse(localStorage.getItem('pms_dates')||'{}');
  dates[d] = val;
  localStorage.setItem('pms_dates', JSON.stringify(dates));
}

// ── PRINT ───────────────────────────────────────────────────────────
function printDay(d) {
  switchDay(d);
  setTimeout(()=>window.print(), 200);
}

// ── CSV EXPORT ──────────────────────────────────────────────────────
function exportCSV(d) {
  let rows = ['Kelas,Under,Nama Atlit,Partai,Hugo'];
  CLASSES.forEach(c=>{
    (data[d][c.id]||[]).forEach(a=>{
      rows.push(`"${c.label}","${a.under}","${a.name}","${a.partai}","${a.hugo}"`);
    });
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `pms_dragon_hari${d+1}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ── ESC CLOSE MODAL ─────────────────────────────────────────────────
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });
document.getElementById('editModal').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

// ── UTILS ────────────────────────────────────────────────────────────
function escHtml(s='') {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Fungsi untuk update status secara real-time dari tabel
function updateMatchStatus(day, cls, id, field, value) {
  const athlete = data[day][cls].find(x => x.id === id);
  if (athlete) {
    athlete[field] = value;
    
    // Logic otomatis: Jika menang/lanjut babak, minta user update nomor partai berikutnya jika tahu
    if (field === 'status' && value === 'Lanjut Babak') {
      const nextPartai = prompt(`Atlit ${athlete.name} LANJUT. Masukkan nomor partai berikutnya (kosongkan jika belum tahu):`, athlete.partai);
      if (nextPartai !== null) athlete.partai = nextPartai.trim();
    }
    
    save(); // Menyimpan ke LocalStorage otomatis
    buildPanel(day); // Refresh tampilan hari tersebut
    renderMedalRekap(); // Refresh papan medali
  }
}

// Fungsi membuat rekapitulasi medali otomatis
function renderMedalRekap() {
  let emas = [], perak = [], perunggu = [];
  
  // Ambil semua data dari semua hari dan kelas
  for(let d=0; d<3; d++) {
    CLASSES.forEach(c => {
      (data[d][c.id] || []).forEach(a => {
        if(a.medali === 'Emas') emas.push(`${a.name} (${c.label} Under ${a.under})`);
        else if(a.medali === 'Perak') perak.push(`${a.name} (${c.label} Under ${a.under})`);
        else if(a.medali === 'Perunggu') perunggu.push(`${a.name} (${c.label} Under ${a.under})`);
      });
    });
  }
  
  // Tampilkan ke elemen HTML Rekap (Buat div dengan id "papan-medali" di HTML Anda)
  const container = document.getElementById('papan-medali');
  if(!container) return;
  
  container.innerHTML = `
    <div style="background:var(--card); border:1px solid var(--gold); padding:20px; border-radius:12px; margin-top:20px;">
      <h3 style="font-family:'Oswald'; color:var(--gold-lt); margin-bottom:12px;">🏆 REKAPITULASI PEROLEHAN MEDAL</h3>
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px;">
        <div><strong>🥇 EMAS (${emas.length})</strong><ul style="padding-left:15px; font-size:13px;">${emas.map(x=>`<li>${x}</li>`).join('')||'<li>Belum ada</li>'}</ul></div>
        <div><strong>🥈 PERAK (${perak.length})</strong><ul style="padding-left:15px; font-size:13px;">${perak.map(x=>`<li>${x}</li>`).join('')||'<li>Belum ada</li>'}</ul></div>
        <div><strong>🥉 PERUNGGU (${perunggu.length})</strong><ul style="padding-left:15px; font-size:13px;">${perunggu.map(x=>`<li>${x}</li>`).join('')||'<li>Belum ada</li>'}</ul></div>
      </div>
    </div>
  `;
}


// ── INIT ─────────────────────────────────────────────────────────────
load();
buildAllPanels();
updateStats();
</script>
</body>
</html>
